name: dockerpostgis

services:
  db:
    image: postgis/postgis
    restart: always
    ports: 
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /data/postgres
      POSTGRES_DB: killgen_db
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data: